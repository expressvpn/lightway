# Lightway WebSocket reverse proxy configuration for nginx
#
# Replace the following placeholders before use:
#   YOUR_DOMAIN       - your domain name (e.g. vpn.example.com)
#   /ws               - WebSocket path (should match client's --ws-path)
#   /path/to/cert.pem - TLS certificate path
#   /path/to/key.pem  - TLS private key path
#   /var/www/html     - optional static site root for camouflage

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Camouflage: serve a static site on the root path
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # WebSocket proxy to lightway-server (with --websocket enabled)
    location /ws {
        proxy_pass http://127.0.0.1:9443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Disable buffering for real-time VPN traffic
        proxy_buffering off;
        proxy_request_buffering off;

        # Long timeout for persistent VPN connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
