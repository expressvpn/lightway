version: "3.8"

# Lightway WebSocket deployment with Caddy
#
# Caddy handles TLS automatically (Let's Encrypt / ZeroSSL).
#
# Prerequisites:
#   - Place lightway-server binary, CA cert, and lwpasswd in ./lightway/
#   - Place server_config.yaml in ./lightway/ (with websocket: true)
#   - Optionally place a static site in ./html/ for camouflage
#   - Edit Caddyfile: replace YOUR_DOMAIN with your actual domain
#
# Usage:
#   docker compose up -d

services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./html:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - lightway-server
    networks:
      - lightway-net

  lightway-server:
    image: ubuntu:24.04
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./lightway:/opt/lightway:ro
    command: >
      /opt/lightway/lightway-server
      --config-file /opt/lightway/server_config.yaml
    expose:
      - "9443"
    networks:
      - lightway-net
    sysctls:
      - net.ipv4.ip_forward=1

volumes:
  caddy_data:
  caddy_config:

networks:
  lightway-net:
    driver: bridge
