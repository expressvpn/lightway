---
# 通过 nginx/caddy 反代连接（推荐）
# server 填域名:443，ws_tls 开启外层 TLS
server: "vpn.example.com:443"
mode: tcp
websocket: true
ws_path: "/api"
ws_tls: true
ws_host: "vpn.example.com"
ca_cert: "ca.crt"
server_dn: ixigua.com
user: user
password: password
tun_name: lightway
tun_local_ip: 100.64.0.6
tun_peer_ip: 100.64.0.5
tun_dns_ip: 100.64.0.1
outside_mtu: 1500
cipher: aes256
log_level: info
enable_pqc: false
enable_tun_iouring: false
iouring_entry_count: 1024
keepalive_interval: 10s
keepalive_timeout: 30s
keepalive_continuous: true
enable_expresslane: false
enable_pmtud: false
route_mode: default
dns_config_mode: noexec

# 直连模式（不经过反代）：
# server: "vpn.example.com:9443"
# ws_tls: false  (或不填，默认 false)
